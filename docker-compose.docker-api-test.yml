version: "3.9"

# Docker API 自更新模拟测试（A2 helper 容器模式）
# 使用方式：docker compose -f docker-compose.docker-api-test.yml up -d
# 注意：此文件仅供开发测试使用，请勿用于生产环境
#
# 测试流程：
#   1. 启动后访问 http://localhost:5003 登录
#   2. 在远端推送新代码，CI 构建新的 :hotupdate-test 镜像
#   3. 在系统设置 → 一键更新中选择 Docker API 方式，触发更新
#   4. 验证 helper 容器自动拉取新镜像并替换旧容器

services:
  app:
    # GHCR 镜像（国内网络推荐）
    image: ghcr.io/zeropointsix/outlook-email-plus:${IMAGE_TAG:-hotupdate-test}
    # Docker Hub 镜像（如需切换取消注释，并注释上行）：
    # image: guangshanshui/outlook-email-plus:${IMAGE_TAG:-hotupdate-test}
    container_name: outlook-dockerapi-test
    ports:
      - "5003:5000"
    env_file:
      - .env
    environment:
      SECRET_KEY: "${SECRET_KEY:-please-change-this-secret-key-for-testing}"
      LOGIN_PASSWORD: "admin123"
      FLASK_ENV: "production"
      SCHEDULER_AUTOSTART: "true"
      DATABASE_PATH: "/app/data/outlook_accounts.db"
      # Docker API 自更新配置
      DOCKER_SELF_UPDATE_ALLOW: "true"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN:-outlook-mail-plus-watchtower-default}"
    volumes:
      - dockerapi_test_data:/app/data
      - ./.runtime:/app/.runtime
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; u.urlopen('http://localhost:5000/healthz', timeout=4).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - dockerapi-test-net

networks:
  dockerapi-test-net:
    driver: bridge

volumes:
  dockerapi_test_data: