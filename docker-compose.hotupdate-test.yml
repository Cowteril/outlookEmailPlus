version: "3.9"

# 热更新模拟测试（Watchtower 方式）
# 使用方式：docker compose -f docker-compose.hotupdate-test.yml up -d
# 测试流程：
#   1. 启动后访问 http://localhost:5002 登录
#   2. 在远端推送新代码，CI 构建新的 :hotupdate-test 镜像
#   3. 在系统设置 → 一键更新中选择 Watchtower 方式，触发更新
#   4. 验证容器自动重启并加载新版本

services:
  app:
    # GHCR 镜像（国内网络推荐）
    image: ghcr.io/zeropointsix/outlook-email-plus:${IMAGE_TAG:-hotupdate-test}
    # Docker Hub 镜像（如需切换取消注释，并注释上行）：
    # image: guangshanshui/outlook-email-plus:${IMAGE_TAG:-hotupdate-test}
    container_name: outlook-hotupdate-test
    ports:
      - "5002:5000"
    env_file:
      - .env
    environment:
      SECRET_KEY: "${SECRET_KEY:-please-change-this-secret-key-for-testing}"
      LOGIN_PASSWORD: "admin123"
      FLASK_ENV: "production"
      SCHEDULER_AUTOSTART: "true"
      DATABASE_PATH: "/app/data/outlook_accounts.db"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN:-outlook-mail-plus-watchtower-default}"
    volumes:
      - hotupdate_test_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; u.urlopen('http://localhost:5000/healthz', timeout=4).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - test-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-test
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-outlook-mail-plus-watchtower-default}
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
    command: --http-api-update --label-enable --debug
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - test-net

networks:
  test-net:
    driver: bridge

volumes:
  hotupdate_test_data:
